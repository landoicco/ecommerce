# H2 database settings
spring.datasource.url=jdbc:h2:mem:ecommercedb_test;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate settings, create tables based on our entities
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Flyway to avoid conficts
spring.flyway.enabled=false

# Mock data as placeholders for env variables and CORS
frontend.url=http://localhost:3000
FRONTEND_URL=http://localhost:3000
DB_USERNAME=mock_user
DB_PASSWORD=mock_pwd
